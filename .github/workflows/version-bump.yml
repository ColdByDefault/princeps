name: Version Bump

on:
  push:
    branches:
      - main

jobs:
  bump:
    # Skip if this push was itself a version-bump commit from this workflow
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token with write access so the push back to main is allowed
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump patch version
        id: bump
        run: |
          OLD=$(node -p "require('./package.json').version")
          NEW=$(node -e "
            const [major, minor, patch] = '$OLD'.split('.').map(Number);
            const next = patch < 9
              ? \`\${major}.\${minor}.\${patch + 1}\`
              : \`\${major}.\${minor + 1}.0\`;
            console.log(next);
          ")
          # Write new version to package.json without creating a git tag
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Update version in README
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new }}"
          sed -i "s/^\*\*Version:\*\* .*/\*\*Version:\*\* ${NEW_VERSION}/" README.md

      - name: Generate changelog entry
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new }}"
          DATE=$(date +%Y-%m-%d)

          # Collect commits since the previous version-bump commit
          PREV_BUMP=$(git log --format="%H" --grep="chore: bump version" -1)
          if [ -z "$PREV_BUMP" ]; then
            COMMITS=$(git log --no-merges --format="- %s" | grep -v "^- chore: bump version" | head -30)
          else
            COMMITS=$(git log "${PREV_BUMP}..HEAD" --no-merges --format="- %s" | grep -v "^- chore: bump version")
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- Minor updates and improvements"
          fi

          # Prepend new entry; create header on first run
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          {
            echo "## [${NEW_VERSION}] - ${DATE}"
            echo ""
            echo "${COMMITS}"
            echo ""
            cat CHANGELOG.md
          } > CHANGELOG.md.new && mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md README.md
          git commit -m "chore: bump version ${{ steps.bump.outputs.old }} → ${{ steps.bump.outputs.new }} [skip ci]"
          git push
