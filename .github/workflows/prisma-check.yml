name: Prisma Schema Check

on:
    pull_request:
        paths:
            - "prisma/schema.prisma"
            - "prisma/migrations/**"

jobs:
    prisma-check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Validate schema syntax
              run: npx prisma validate

            - name: Check schema formatting
              run: npx prisma format --check

            - name: Check migration drift
              # Compares the cumulative state of all local migration files against
              # the current schema.prisma. Exits non-zero if they diverge, which
              # means a new migration was not generated after editing the schema.
              # No live database connection is required for this comparison.
              env:
                  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
              run: |
                  npx prisma migrate diff \
                    --from-migrations ./prisma/migrations \
                    --to-schema-datamodel ./prisma/schema.prisma \
                    --exit-code \
                  && echo "Schema and migrations are in sync." \
                  || (echo "ERROR: schema.prisma has changes not covered by a migration. Run 'prisma migrate dev --name <name>' to generate one." && exit 1)
