name: Dependency Audit

on:
    schedule:
        # Every Monday at 09:00 UTC
        - cron: "0 9 * * 1"
    workflow_dispatch:

jobs:
    audit:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            issues: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run audit
              id: audit
              run: npm audit --audit-level=high
              continue-on-error: true

            - name: Open issue on failure
              if: steps.audit.outcome == 'failure'
              uses: actions/github-script@v7
              with:
                  script: |
                      const today = new Date().toISOString().split('T')[0];
                      const title = `Security: npm audit found high/critical vulnerabilities (${today})`;

                      const { data: openIssues } = await github.rest.issues.listForRepo({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          state: 'open',
                          labels: ['security'],
                      });

                      const alreadyOpen = openIssues.some(i => i.title === title);
                      if (alreadyOpen) {
                          console.log('Issue already open, skipping.');
                          return;
                      }

                      await github.rest.issues.create({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          title,
                          body: [
                              '## Weekly audit alert',
                              '',
                              'The scheduled `npm audit --audit-level=high` check found **high or critical** vulnerabilities.',
                              '',
                              '**Action required:**',
                              '1. Run `npm audit` locally to inspect the findings.',
                              '2. Run `npm audit fix` or update affected packages manually.',
                              '3. Close this issue once resolved.',
                          ].join('\n'),
                          labels: ['security'],
                      });
